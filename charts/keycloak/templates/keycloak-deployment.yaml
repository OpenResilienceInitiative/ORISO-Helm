apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      terminationGracePeriodSeconds: 60
      {{- if .Values.keycloakSecurityContext }}
      securityContext:
        {{- toYaml .Values.keycloakSecurityContext.pod | nindent 8 }}
      {{- end }}
      {{- if .Values.keycloakServiceAccount }}
      serviceAccountName: {{ .Values.keycloakServiceAccount | quote }}
      {{- end }}
      initContainers:
        - name: wait-for-mariadb
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.dbServer }}.{{ .Release.Namespace }} 3306; do echo waiting for mariadb; sleep 2; done']
      containers:
        - name: keycloak
          image: {{ .Values.imageName }}:{{ .Values.imageVersion }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          {{- if .Values.keycloakResources }}
          resources:
            {{- toYaml .Values.keycloakResources | nindent 12 }}
          {{- end }}
          command:
            - /opt/keycloak/bin/kc.sh
          args:
            - start
          env:
            - name: KC_DB
              valueFrom:
                configMapKeyRef:
                  key: DB_VENDOR
                  name: keycloak-configmap-env
            - name: KC_DB_URL_HOST
              valueFrom:
                configMapKeyRef:
                  key: DB_ADDR
                  name: keycloak-configmap-env
            - name: KC_DB_URL_DATABASE
              valueFrom:
                configMapKeyRef:
                  key: DB_DATABASE
                  name: keycloak-configmap-env
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  key: DB_USER
                  name: keycloak-secret-env
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: DB_PASSWORD
                  name: keycloak-secret-env
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  key: KEYCLOAK_ADMIN
                  name: keycloak-secret-env
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: KEYCLOAK_ADMIN_PASSWORD
                  name: keycloak-secret-env
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  key: KEYCLOAK_HOSTNAME
                  name: keycloak-configmap-env
            {{- if not .Values.global.enableTls }}
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            {{- end }}
            - name: KC_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  key: ROOT_LOGLEVEL
                  name: keycloak-configmap-env
          {{- if .Values.keycloakSecurityContext }}
          securityContext:
            {{- toYaml .Values.keycloakSecurityContext.container | nindent 12 }}
          {{- if .Values.keycloakProbes }}
          startupProbe:
            httpGet:
              path: {{ .Values.keycloakProbes.startup.path | default "/health/started" }}
              port: 8080
            initialDelaySeconds: {{ .Values.keycloakProbes.startup.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.keycloakProbes.startup.periodSeconds | default 10 }}
            failureThreshold: {{ .Values.keycloakProbes.startup.failureThreshold | default 60 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.keycloakProbes.liveness.path | default "/health/live" }}
              port: 8080
            initialDelaySeconds: {{ .Values.keycloakProbes.liveness.initialDelaySeconds | default 60 }}
            periodSeconds: {{ .Values.keycloakProbes.liveness.periodSeconds | default 30 }}
            failureThreshold: {{ .Values.keycloakProbes.liveness.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.keycloakProbes.readiness.path | default "/health/ready" }}
              port: 8080
            initialDelaySeconds: {{ .Values.keycloakProbes.readiness.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.keycloakProbes.readiness.periodSeconds | default 10 }}
            failureThreshold: {{ .Values.keycloakProbes.readiness.failureThreshold | default 3 }}
          {{- end }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    (
                    sleep 300;
                    if [ ! -f /tmp/keycloak-initialized.lock ]; then
                      /opt/keycloak/bin/kc.sh import --file /data/import/realm.json && \
                      touch /tmp/keycloak-initialized.lock;
                    fi
                    ) &
          volumeMounts:
            - mountPath: /opt/keycloak/themes/custom-theme/login
              name: keycloak-theme-templates
            - mountPath: /opt/keycloak/themes/custom-theme/login/messages
              name: keycloak-theme-templates-messages
            - mountPath: /opt/keycloak/themes/custom-theme/login/resources/css
              name: keycloak-theme-templates-styles
            - mountPath: /opt/keycloak/themes/custom-theme/login/resources/fonts/Nunito
              name: keycloak-theme-templates-fonts
            - mountPath: /opt/keycloak/themes/custom-theme/email/messages
              name: keycloak-theme-email-messages
            - mountPath: /opt/keycloak/themes/custom-theme/email/html
              name: keycloak-theme-email-html
            - mountPath: /opt/keycloak/themes/custom-theme/email/text
              name: keycloak-theme-email-text
            - mountPath: /data/import
              name: keycloak-full-dump
      volumes:
        - name: keycloak-theme-templates
          configMap:
            name: keycloak-configmap-theme-templates
        - name: keycloak-theme-templates-messages
          configMap:
            name: keycloak-configmap-theme-templates-messages
        - name: keycloak-theme-templates-styles
          configMap:
            name: keycloak-configmap-theme-templates-styles
        - name: keycloak-theme-templates-fonts
          configMap:
            name: keycloak-configmap-theme-templates-fonts
        - name: keycloak-theme-email-html
          configMap:
            name: keycloak-configmap-theme-email-html
        - name: keycloak-theme-email-text
          configMap:
            name: keycloak-configmap-theme-email-text
        - name: keycloak-theme-email-messages
          configMap:
            name: keycloak-configmap-theme-email-messages
        - name: keycloak-full-dump
          configMap:
            name: keycloak-configmap-data
