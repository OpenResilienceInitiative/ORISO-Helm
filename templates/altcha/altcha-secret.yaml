{{- if and .Values.altcha.enabled .Values.altcha.createSecret }}
# PoC/local only. In real environments provide the HMAC key out-of-band
# (sealed secret referenced via altcha.existingSecret, key: hmac-key).
apiVersion: v1
kind: Secret
metadata:
  name: altcha-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app: altcha-server
type: Opaque
stringData:
  hmac-key: {{ .Values.altcha.hmacKey | quote }}
{{- end }}
