{{- $gSvc := default dict (.Values.global | default dict).services -}}
{{- $gCh  := default dict $gSvc.clickhouse -}}
{{- $chHost := default .Values.signoz.clickhouse.host (default "" $gCh.host) -}}
{{- $chPort := default .Values.signoz.clickhouse.port (default 0 $gCh.port) -}}
{{- $gDom := default dict (.Values.global | default dict).domains -}}
{{- $extUrl := .Values.signoz.appConfig.alertmanager.signozExternalUrl -}}
{{- if and (eq $extUrl "") $gDom.status -}}
{{- $extUrl = printf "https://%s" $gDom.status -}}
{{- end -}}
{{- if eq $extUrl "" -}}
{{- $extUrl = printf "http://%s.%s.svc.cluster.local:%v" (include "signoz.fullname" .) (default .Release.Namespace .Values.signoz.namespace) .Values.signoz.service.port -}}
{{- end -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "signoz.fullname" . }}
  namespace: {{ default .Release.Namespace .Values.signoz.namespace }}
  labels:
    {{- include "signoz.labels" . | nindent 4 }}
    app.kubernetes.io/component: signoz
spec:
  serviceName: {{ include "signoz.fullname" . }}
  replicas: {{ .Values.signoz.replicas }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: signoz
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ include "signoz.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: signoz
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: {{ include "signoz.name" . }}
    spec:
      initContainers:
      - name: wait-for-clickhouse
        image: busybox:1.35
        command: ['sh', '-c']
        args:
        - |
          until nc -z {{ $chHost }} {{ $chPort }}; do
            echo "Waiting for ClickHouse at {{ $chHost }}:{{ $chPort }}..."
            sleep 2
          done
          echo "ClickHouse is ready!"
      containers:
      - name: signoz
        image: "{{ .Values.signoz.image.repository }}:{{ .Values.signoz.image.tag }}"
        imagePullPolicy: {{ .Values.signoz.image.pullPolicy }}
        env:
        - name: CLICKHOUSE_HOST
          value: {{ $chHost | quote }}
        - name: CLICKHOUSE_PORT
          value: {{ $chPort | quote }}
        - name: CLICKHOUSE_HTTP_PORT
          value: {{ .Values.signoz.clickhouse.httpPort | quote }}
        - name: CLICKHOUSE_CLUSTER
          value: {{ .Values.signoz.clickhouse.cluster | quote }}
        - name: CLICKHOUSE_USER
          value: {{ .Values.signoz.clickhouse.user | quote }}
        - name: CLICKHOUSE_PASSWORD
          {{- if and .Values.signoz.clickhouse.secret.name .Values.signoz.clickhouse.secret.key }}
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.signoz.clickhouse.secret.name }}
              key: {{ .Values.signoz.clickhouse.secret.key }}
          {{- else }}
          value: {{ .Values.signoz.clickhouse.password | quote }}
          {{- end }}
        - name: CLICKHOUSE_SECURE
          value: "false"
        - name: SIGNOZ_TELEMETRYSTORE_PROVIDER
          value: {{ .Values.signoz.appConfig.telemetryStore.provider | quote }}
        - name: SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN
          value: tcp://{{ $chHost }}:{{ $chPort }}/?username=$(CLICKHOUSE_USER)&password=$(CLICKHOUSE_PASSWORD)
        - name: SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_CLUSTER
          value: {{ .Values.signoz.clickhouse.cluster | quote }}
        - name: SIGNOZ_PROMETHEUS_ACTIVE_QUERY_TRACKER_ENABLED
          value: {{ .Values.signoz.appConfig.prometheus.activeQueryTracker.enabled | quote }}
        - name: SIGNOZ_EMAILING_ENABLED
          value: {{ .Values.signoz.appConfig.emailing.enabled | quote }}
        - name: SIGNOZ_ALERTMANAGER_SIGNOZ_EXTERNAL__URL
          value: {{ $extUrl | quote }}
        - name: SIGNOZ_ALERTMANAGER_PROVIDER
          value: {{ .Values.signoz.appConfig.alertmanager.provider | quote }}
        - name: DOT_METRICS_ENABLED
          value: {{ .Values.signoz.appConfig.dotMetrics.enabled | quote }}
        ports:
        - name: http
          containerPort: {{ .Values.signoz.service.targetPort }}
          protocol: TCP
        - name: http-internal
          containerPort: {{ .Values.signoz.service.internalPort }}
          protocol: TCP
        - name: opamp-internal
          containerPort: {{ .Values.signoz.service.opampPort }}
          protocol: TCP
        - name: otel-grpc
          containerPort: {{ .Values.signoz.service.otlpGrpcPort }}
          protocol: TCP
        - name: otel-http
          containerPort: {{ .Values.signoz.service.otlpHttpPort }}
          protocol: TCP
        {{- if .Values.signoz.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.signoz.livenessProbe | nindent 10 }}
        {{- end }}
        {{- if .Values.signoz.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.signoz.readinessProbe | nindent 10 }}
        {{- end }}
        {{- if .Values.signoz.resources }}
        resources:
          {{- toYaml .Values.signoz.resources | nindent 10 }}
        {{- end }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - name: signoz-data
          mountPath: /var/lib/signoz
      terminationGracePeriodSeconds: 30
  {{- if .Values.signoz.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: signoz-data
    spec:
      accessModes:
      - {{ .Values.signoz.persistence.accessMode }}
      {{- with .Values.signoz.persistence.storageClass }}
      storageClassName: {{ . }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.signoz.persistence.size }}
  {{- end }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
