{{- if .Values.signoz.enabled }}
{{/*
ClickHouse config drop-in required by the SigNoz schema migrator: it issues
ON CLUSTER "{{ .Values.signoz.clickhouse.cluster }}" DDL, which needs
(a) a remote_servers cluster of that name and (b) a (Zoo)Keeper for the
distributed DDL queue. Vanilla clickhouse-server ships neither. The embedded
ClickHouse Keeper replaces the separate zookeeper of the official SigNoz
setup — fine for our single-node instance.

The replica host must be a LOCAL address (127.0.0.1), not the Service name:
the DDL worker only executes ON CLUSTER tasks for hosts it recognizes as
itself, and a Service ClusterIP is never local to the pod.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "signoz.clickhouse.fullname" . }}-config
  namespace: {{ default .Release.Namespace .Values.signoz.namespace }}
  labels:
    {{- include "signoz.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
data:
  cluster.xml: |
    <clickhouse>
      <keeper_server>
        <tcp_port>9181</tcp_port>
        <server_id>1</server_id>
        <log_storage_path>/var/lib/clickhouse/coordination/log</log_storage_path>
        <snapshot_storage_path>/var/lib/clickhouse/coordination/snapshots</snapshot_storage_path>
        <coordination_settings>
          <operation_timeout_ms>10000</operation_timeout_ms>
          <session_timeout_ms>30000</session_timeout_ms>
        </coordination_settings>
        <raft_configuration>
          <server>
            <id>1</id>
            <hostname>localhost</hostname>
            <port>9234</port>
          </server>
        </raft_configuration>
      </keeper_server>
      <zookeeper>
        <node>
          <host>localhost</host>
          <port>9181</port>
        </node>
      </zookeeper>
      <remote_servers>
        <{{ .Values.signoz.clickhouse.cluster }}>
          <shard>
            <replica>
              <host>127.0.0.1</host>
              <port>{{ .Values.signoz.clickhouse.port }}</port>
            </replica>
          </shard>
        </{{ .Values.signoz.clickhouse.cluster }}>
      </remote_servers>
    </clickhouse>
{{- end }}
