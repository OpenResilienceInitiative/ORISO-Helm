{{- if .Values.signoz.enabled }}
{{/*
Gateway collector configuration for the SigNoz ingest layer.

The signoz/signoz single binary does NOT ingest OTLP (verified on Pre-Dev:
it listens on 8080/4320/6060/9090 only). Ingest is SigNoz's own collector
distribution signoz/signoz-otel-collector, which writes to ClickHouse
directly via the clickhousetraces / signozclickhousemetrics /
clickhouselogsexporter exporters and registers with the SigNoz backend over
opamp (ws://signoz:4320).

This config follows the upstream references paired with SigNoz v0.105.1
(charts tag signoz-0.105.1 and deploy/docker/otel-collector-config.yaml at
v0.105.1), minus the jaeger/httplog/prometheus receivers we do not use,
plus the memory_limiter (K8-L02) and k8sattributes processors.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "signoz.otelCollector.fullname" . }}
  namespace: {{ default .Release.Namespace .Values.signoz.namespace }}
  labels:
    {{- include "signoz.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  otel-collector-config.yaml: |
    connectors:
      signozmeter:
        metrics_flush_interval: 1h
        dimensions:
          - name: service.name
          - name: deployment.environment
          - name: host.name

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            max_recv_msg_size_mib: 16
          http:
            endpoint: 0.0.0.0:4318

    processors:
      # memory_limiter MUST run first in every pipeline (K8-L02).
      memory_limiter:
        check_interval: 1s
        limit_mib: {{ .Values.signoz.otelCollector.memoryLimiter.limitMib }}
        spike_limit_mib: {{ .Values.signoz.otelCollector.memoryLimiter.spikeLimitMib }}
      # Enrich telemetry with Kubernetes metadata, associated via the
      # sending pod's connection IP (services export OTLP directly here;
      # the log agent pre-sets its k8s attributes, which k8sattributes
      # does not overwrite).
      k8sattributes:
        passthrough: false
        pod_association:
          - sources:
              - from: connection
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.node.name
      # APM RED metrics derived from spans (upstream signoz-0.105.1 config).
      signozspanmetrics/delta:
        metrics_exporter: signozclickhousemetrics
        latency_histogram_buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s]
        dimensions_cache_size: 100000
        aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
        dimensions:
          - name: service.namespace
            default: default
          - name: deployment.environment
            default: default
          - name: signoz.collector.id
      batch:
        send_batch_size: 50000
        timeout: 1s
      batch/meter:
        send_batch_max_size: 25000
        send_batch_size: 20000
        timeout: 1s

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: localhost:1777

    exporters:
      clickhousetraces:
        datasource: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_TRACE_DATABASE}
        low_cardinal_exception_grouping: ${env:LOW_CARDINAL_EXCEPTION_GROUPING}
        use_new_schema: true
      signozclickhousemetrics:
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_DATABASE}
        timeout: 45s
      clickhouselogsexporter:
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_LOG_DATABASE}
        timeout: 10s
        use_new_schema: true
      signozclickhousemeter:
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_METER_DATABASE}
        timeout: 45s
        sending_queue:
          enabled: false

    service:
      telemetry:
        logs:
          encoding: json
      extensions: [health_check, pprof]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, signozspanmetrics/delta, batch]
          exporters: [clickhousetraces, signozmeter]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [signozclickhousemetrics, signozmeter]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [clickhouselogsexporter, signozmeter]
        metrics/meter:
          receivers: [signozmeter]
          processors: [batch/meter]
          exporters: [signozclickhousemeter]
  otel-collector-opamp-config.yaml: |
    server_endpoint: "ws://{{ include "signoz.fullname" . }}.{{ default .Release.Namespace .Values.signoz.namespace }}.svc.cluster.local:{{ .Values.signoz.service.opampPort }}/v1/opamp"
{{- end }}
