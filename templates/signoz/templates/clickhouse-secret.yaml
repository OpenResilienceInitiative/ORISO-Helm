{{- if .Values.signoz.enabled }}
{{/*
ClickHouse credentials as a proper Secret (finding LC-M03: the previously
deployed StatefulSets carried the password as plaintext env / ConfigMap).
Both the ClickHouse server and the SigNoz backend consume this Secret via
secretKeyRef, so rotating global.secrets.clickhousePassword and restarting
both pods rotates the credential consistently.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.signoz.clickhouse.secret.name }}
  namespace: {{ default .Release.Namespace .Values.signoz.namespace }}
  labels:
    {{- include "signoz.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
type: Opaque
data:
  username: {{ .Values.signoz.clickhouse.user | b64enc }}
  {{ .Values.signoz.clickhouse.secret.key }}: {{ required "global.secrets.clickhousePassword is required (set it in your secrets overlay)" .Values.global.secrets.clickhousePassword | b64enc }}
{{- end }}
