{{- if .Values.signoz.enabled }}
{{- $chHost := include "signoz.clickhouse.host" . }}
{{/*
Gateway collector = SigNoz ingest layer (signoz/signoz-otel-collector).
Name and selector (app=otel-collector) deliberately match the Deployment
already running on Pre-Dev so an upgrade adopts it in place (Deployment
selectors are immutable).

It writes to ClickHouse directly (the signoz/signoz backend has no OTLP
listener) and registers with the SigNoz backend over opamp. The schema
migrator jobs must have completed once before this pod becomes healthy; the
collector restarts until the SigNoz schema exists.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "signoz.otelCollector.fullname" . }}
  namespace: {{ default .Release.Namespace .Values.signoz.namespace }}
  labels:
    {{- include "signoz.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  replicas: {{ .Values.signoz.otelCollector.replicas }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
      annotations:
        # Roll the pods whenever the collector config changes.
        checksum/config: {{ include (print $.Template.BasePath "/signoz/templates/otel-collector-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "signoz.otelCollector.fullname" . }}
      initContainers:
      # Upstream (chart signoz-0.132.2) gates the collector on the schema
      # being current: "migrate sync check" fails (and the pod retries)
      # until the schema-migrator Job has run — no extra RBAC needed.
      {{- if .Values.signoz.schemaMigrator.enabled }}
      - name: check
        image: "{{ .Values.signoz.otelCollector.image.repository }}:{{ .Values.signoz.otelCollector.image.tag }}"
        imagePullPolicy: {{ .Values.signoz.otelCollector.image.pullPolicy }}
        command: ["/signoz-otel-collector"]
        args: ["migrate", "sync", "check"]
        env:
          {{- include "signoz.migratorEnv" . | nindent 10 }}
      {{- end }}
      containers:
      - name: otel-collector
        image: "{{ .Values.signoz.otelCollector.image.repository }}:{{ .Values.signoz.otelCollector.image.tag }}"
        imagePullPolicy: {{ .Values.signoz.otelCollector.image.pullPolicy }}
        command: ["/signoz-otel-collector"]
        # NOTE: no --feature-gates=-pkg.translator.prometheus.NormalizeName
        # any more — upstream dropped it between charts 0.105.1 and 0.132.2
        # (the gate no longer exists in v0.144.x and would fail startup).
        args:
        - --config=/conf/otel-collector-config.yaml
        - --manager-config=/conf/otel-collector-opamp-config.yaml
        - --copy-path=/var/tmp/collector-config.yaml
        env:
        - name: CLICKHOUSE_HOST
          value: {{ $chHost | quote }}
        - name: CLICKHOUSE_PORT
          value: {{ .Values.signoz.clickhouse.port | quote }}
        - name: CLICKHOUSE_HTTP_PORT
          value: {{ .Values.signoz.clickhouse.httpPort | quote }}
        - name: CLICKHOUSE_CLUSTER
          value: {{ .Values.signoz.clickhouse.cluster | quote }}
        - name: CLICKHOUSE_USER
          value: {{ .Values.signoz.clickhouse.user | quote }}
        - name: CLICKHOUSE_PASSWORD
          # LC-M03: credential comes from a Secret, never plaintext env.
          valueFrom:
            secretKeyRef:
              name: {{ .Values.signoz.clickhouse.secret.name }}
              key: {{ .Values.signoz.clickhouse.secret.key }}
        - name: CLICKHOUSE_SECURE
          value: "false"
        - name: CLICKHOUSE_VERIFY
          value: "false"
        # SigNoz signal databases (upstream chart defaults).
        - name: CLICKHOUSE_DATABASE
          value: "signoz_metrics"
        - name: CLICKHOUSE_TRACE_DATABASE
          value: "signoz_traces"
        - name: CLICKHOUSE_LOG_DATABASE
          value: "signoz_logs"
        - name: CLICKHOUSE_METER_DATABASE
          value: "signoz_meter"
        - name: LOW_CARDINAL_EXCEPTION_GROUPING
          value: "false"
        {{- if .Values.signoz.mariadbMetrics.enabled }}
        # OBS-P4: mysql receiver credentials. LC-M03: sourced via
        # secretKeyRef from the SAME Secret the AgencyService Deployment
        # already uses (templates/agencyservice/agencyservice-secret.yaml) —
        # no new plaintext credential. See the values.yaml.default comment
        # on mariadbMetrics.existingSecret for why this is flagged as an
        # open question (schema-scoped app credential, not a dedicated
        # least-privilege monitoring account).
        - name: MARIADB_METRICS_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ default (printf "%s-agencyservice-secrets" .Release.Name) .Values.signoz.mariadbMetrics.existingSecret.name }}
              key: {{ .Values.signoz.mariadbMetrics.existingSecret.usernameKey }}
        - name: MARIADB_METRICS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ default (printf "%s-agencyservice-secrets" .Release.Name) .Values.signoz.mariadbMetrics.existingSecret.name }}
              key: {{ .Values.signoz.mariadbMetrics.existingSecret.passwordKey }}
        {{- end }}
        {{- if .Values.global.observability.telemetryPseudonymizationEnabled }}
        # OBS-P6: keyed-hash salt for the transform/pseudonymize_* processors
        # (otel-collector-configmap.yaml). Only present when the pipeline is
        # enabled — see otel-collector-pseudonymization-secret.yaml.
        - name: PSEUDONYM_HMAC_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "signoz.otelCollector.fullname" . }}-pseudonymization
              key: hmacKey
        {{- end }}
        ports:
        - name: otlpgrpc
          containerPort: 4317
          protocol: TCP
        - name: otlphttp
          containerPort: 4318
          protocol: TCP
        - name: metrics
          containerPort: 8888
          protocol: TCP
        - name: health
          containerPort: 13133
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 13133
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 6
          successThreshold: 1
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 13133
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
          successThreshold: 1
          timeoutSeconds: 5
        {{- if .Values.signoz.otelCollector.resources }}
        resources:
          {{- toYaml .Values.signoz.otelCollector.resources | nindent 10 }}
        {{- end }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - name: config
          mountPath: /conf
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: {{ include "signoz.otelCollector.fullname" . }}
      terminationGracePeriodSeconds: 30
{{- end }}
