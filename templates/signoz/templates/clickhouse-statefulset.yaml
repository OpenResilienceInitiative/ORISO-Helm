{{- if .Values.signoz.enabled }}
{{/*
In-chart ClickHouse for SigNoz. The spec deliberately mirrors the StatefulSet
already running on Pre-Dev (name oriso-platform-clickhouse, selector
app=clickhouse, serviceName oriso-platform-clickhouse, volumeClaimTemplate
"clickhouse-data" 50Gi local-path) so a helm upgrade of release
"oriso-platform" adopts the running instance and its PVC instead of creating
a duplicate. StatefulSet selector and volumeClaimTemplates are immutable —
do not rename these fields.
*/}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "signoz.clickhouse.fullname" . }}
  namespace: {{ default .Release.Namespace .Values.signoz.namespace }}
  labels:
    {{- include "signoz.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  serviceName: {{ include "signoz.clickhouse.fullname" . }}
  replicas: {{ .Values.signoz.clickhouse.replicas }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
      - name: clickhouse
        image: "{{ .Values.signoz.clickhouse.image.repository }}:{{ .Values.signoz.clickhouse.image.tag }}"
        imagePullPolicy: {{ .Values.signoz.clickhouse.image.pullPolicy }}
        env:
        - name: CLICKHOUSE_DB
          value: {{ .Values.signoz.clickhouse.database | quote }}
        - name: CLICKHOUSE_USER
          value: {{ .Values.signoz.clickhouse.user | quote }}
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.signoz.clickhouse.secret.name }}
              key: {{ .Values.signoz.clickhouse.secret.key }}
        ports:
        - name: http
          containerPort: {{ .Values.signoz.clickhouse.httpPort }}
          protocol: TCP
        - name: native
          containerPort: {{ .Values.signoz.clickhouse.port }}
          protocol: TCP
        - name: interserver
          containerPort: 9009
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: native
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe:
          httpGet:
            path: /ping
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
          successThreshold: 1
          timeoutSeconds: 1
        {{- if .Values.signoz.clickhouse.resources }}
        resources:
          {{- toYaml .Values.signoz.clickhouse.resources | nindent 10 }}
        {{- end }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - name: clickhouse-data
          mountPath: /var/lib/clickhouse
      terminationGracePeriodSeconds: 30
  {{- if .Values.signoz.clickhouse.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: clickhouse-data
    spec:
      accessModes:
      - {{ .Values.signoz.clickhouse.persistence.accessMode }}
      storageClassName: {{ .Values.signoz.clickhouse.persistence.storageClass }}
      resources:
        requests:
          storage: {{ .Values.signoz.clickhouse.persistence.size }}
  {{- end }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
{{- end }}
