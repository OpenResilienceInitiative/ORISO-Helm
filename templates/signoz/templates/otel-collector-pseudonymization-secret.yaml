{{- if and .Values.signoz.enabled .Values.global.observability.telemetryPseudonymizationEnabled }}
{{/*
OBS-P6: HMAC salt for the gateway collector's prod telemetry pseudonymization
pipeline (otel-collector-configmap.yaml, transform/pseudonymize_* processors).
Mirrors the clickhouse-secret.yaml pattern (LC-M03): the credential is a
proper Secret consumed via secretKeyRef, never plaintext env or a ConfigMap.
Only rendered when the pipeline itself is enabled — no secret, no unused env
var, when the flag is off (the default everywhere today).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "signoz.otelCollector.fullname" . }}-pseudonymization
  namespace: {{ default .Release.Namespace .Values.signoz.namespace }}
  labels:
    {{- include "signoz.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
type: Opaque
data:
  hmacKey: {{ required "global.secrets.telemetryPseudonymizationHmacKey is required when global.observability.telemetryPseudonymizationEnabled=true (OBS-P6) — set it in your secrets overlay, never commit a real value" .Values.global.secrets.telemetryPseudonymizationHmacKey | b64enc }}
{{- end }}
