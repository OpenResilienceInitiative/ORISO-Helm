{{- if and .Values.signoz.enabled .Values.signoz.schemaMigrator.enabled }}
{{- $chHost := include "signoz.clickhouse.host" . }}
{{- $ns := default .Release.Namespace .Values.signoz.namespace }}
{{/*
SigNoz ClickHouse schema migrator (sync + async), following the upstream
chart signoz-0.105.1 (image signoz/signoz-schema-migrator, args
"sync|async --cluster-name ... --dsn ... --up="). The sync job MUST complete
before the otel-collector can write; run async after sync.

Jobs are immutable: when re-deploying via kubectl, delete them first
(kubectl -n caritas delete job <release>-schema-migrator-sync
<release>-schema-migrator-async --ignore-not-found). The helm hook
annotations re-create them automatically on helm-driven upgrades.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-schema-migrator-sync
  namespace: {{ $ns }}
  labels:
    {{- include "signoz.labels" . | nindent 4 }}
    app.kubernetes.io/component: schema-migrator
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: schema-migrator-sync
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-clickhouse
        image: busybox:1.35
        command: ['sh', '-c']
        args:
        - |
          until nc -z {{ $chHost }} {{ .Values.signoz.clickhouse.port }}; do
            echo "waiting for ClickHouse at {{ $chHost }}:{{ .Values.signoz.clickhouse.port }}..."
            sleep 2
          done
          echo "ClickHouse is ready"
      containers:
      - name: schema-migrator
        image: "{{ .Values.signoz.schemaMigrator.image.repository }}:{{ .Values.signoz.schemaMigrator.image.tag }}"
        imagePullPolicy: {{ .Values.signoz.schemaMigrator.image.pullPolicy }}
        env:
        - name: CLICKHOUSE_CLUSTER
          value: {{ .Values.signoz.clickhouse.cluster | quote }}
        - name: CLICKHOUSE_USER
          value: {{ .Values.signoz.clickhouse.user | quote }}
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.signoz.clickhouse.secret.name }}
              key: {{ .Values.signoz.clickhouse.secret.key }}
        args:
        - sync
        - --cluster-name
        - $(CLICKHOUSE_CLUSTER)
        - --dsn
        - tcp://$(CLICKHOUSE_USER):$(CLICKHOUSE_PASSWORD)@{{ $chHost }}:{{ .Values.signoz.clickhouse.port }}
        - --up=
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-schema-migrator-async
  namespace: {{ $ns }}
  labels:
    {{- include "signoz.labels" . | nindent 4 }}
    app.kubernetes.io/component: schema-migrator
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 15
  template:
    metadata:
      labels:
        app: schema-migrator-async
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-clickhouse
        image: busybox:1.35
        command: ['sh', '-c']
        args:
        - |
          until nc -z {{ $chHost }} {{ .Values.signoz.clickhouse.port }}; do
            echo "waiting for ClickHouse at {{ $chHost }}:{{ .Values.signoz.clickhouse.port }}..."
            sleep 2
          done
          echo "ClickHouse is ready"
      containers:
      - name: schema-migrator
        image: "{{ .Values.signoz.schemaMigrator.image.repository }}:{{ .Values.signoz.schemaMigrator.image.tag }}"
        imagePullPolicy: {{ .Values.signoz.schemaMigrator.image.pullPolicy }}
        env:
        - name: CLICKHOUSE_CLUSTER
          value: {{ .Values.signoz.clickhouse.cluster | quote }}
        - name: CLICKHOUSE_USER
          value: {{ .Values.signoz.clickhouse.user | quote }}
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.signoz.clickhouse.secret.name }}
              key: {{ .Values.signoz.clickhouse.secret.key }}
        args:
        - async
        - --cluster-name
        - $(CLICKHOUSE_CLUSTER)
        - --dsn
        - tcp://$(CLICKHOUSE_USER):$(CLICKHOUSE_PASSWORD)@{{ $chHost }}:{{ .Values.signoz.clickhouse.port }}
        - --up=
{{- end }}
