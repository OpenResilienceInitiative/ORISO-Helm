{{- if and .Values.mediaScanner.enabled .Values.mediaScanner.aiCheck.enabled .Values.mediaScanner.aiCheck.createSecret }}
# Mistral API key for the AI content check. In real environments provide this
# out-of-band (sealed secret / existing secret referenced via
# mediaScanner.aiCheck.existingSecret) rather than committing a value.
apiVersion: v1
kind: Secret
metadata:
  name: media-scanner-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app: media-scanner
type: Opaque
stringData:
  mistral-api-key: {{ .Values.mediaScanner.aiCheck.apiKey | quote }}
{{- end }}
