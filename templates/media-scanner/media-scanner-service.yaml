{{- if .Values.mediaScanner.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: media-scanner
  namespace: {{ .Release.Namespace }}
  labels:
    app: media-scanner
spec:
  type: ClusterIP
  selector:
    app: media-scanner
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
{{- end }}
