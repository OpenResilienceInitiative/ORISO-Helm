apiVersion: apps/v1
kind: Deployment
metadata:
  name: element-call
  namespace: {{ .Release.Namespace }}
  labels:
    app: element-call
spec:
  replicas: 1
  selector:
    matchLabels:
      app: element-call
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: element-call
    spec:
      containers:
      - name: element-call
        image: ghcr.io/openresilienceinitiative/element-call:latest
        imagePullPolicy: Always
        ports:
          - containerPort: 80
            name: http
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 80
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_BIND_SERVICE
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
          - mountPath: /app/config.json
            name: element-call-config
            readOnly: true
            subPath: config.json
      volumes:
        - name: element-call-config
          configMap:
            name: element-call-config
