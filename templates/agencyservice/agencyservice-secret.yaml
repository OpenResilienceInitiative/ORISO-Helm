apiVersion: v1
kind: Secret
metadata:
  name: agencyservice-secret
type: Opaque
data:
  SPRING_LIQUIBASE_USER: {{ .Values.global.secrets.liquibaseUser | b64enc | quote }}
  SPRING_LIQUIBASE_PASSWORD: {{ .Values.global.secrets.liquibasePassword | b64enc | quote }}
  AGENCYSERVICE_SPRING_DATASOURCE_USERNAME: {{ .Values.global.secrets.agencyServiceDbUsername | b64enc | quote }}
  AGENCYSERVICE_SPRING_DATASOURCE_PASSWORD: {{ .Values.global.secrets.agencyServiceDbPassword | b64enc | quote }}
  KEYCLOAK_CONFIG_ADMIN_USERNAME: {{ .Values.global.secrets.keycloakAdminUsername | b64enc | quote }}
  KEYCLOAK_CONFIG_ADMIN_PASSWORD: {{ .Values.global.secrets.keycloakAdminPassword | b64enc | quote }}
  MATRIX_ADMIN_USERNAME: {{ .Values.global.matrix.matrixAdminUsername | b64enc | quote }}
  MATRIX_ADMIN_PASSWORD: {{ .Values.global.matrix.matrixAdminPassword | b64enc | quote }}
  MATRIX_REGISTRATION_SHARED_SECRET: {{.Values.global.secrets.matrixRegistrationSharedSecret | b64enc | quote }}
  # AS-C01: encrypts agency Matrix service-account passwords at rest.
  # `required` is deliberate. A blank value renders an empty key and lets
  # `helm upgrade` succeed while shipping a Secret AgencyService cannot use --
  # that is the ORISO-Helm#49 failure mode, where the key was missing entirely
  # and every stored `enc:` credential became undecryptable. Fail the deploy
  # instead. Supply the value from the environment secrets file, never here.
  SERVICE_ENCRYPTION_APPKEY: {{ required "agencyService.serviceEncryptionAppkey is required (AS-C01 Matrix credential encryption at rest); set it in your environment secrets.yaml" .Values.agencyService.serviceEncryptionAppkey | b64enc | quote }}

