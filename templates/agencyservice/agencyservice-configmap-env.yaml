apiVersion: v1
kind: ConfigMap
metadata:
  name: agencyservice-configmap-env
data:
  CSRF_COOKIE_PROPERTY:  {{ .Values.global.csrfCookieProperty }}
  CSRF_HEADER_PROPERTY: {{ .Values.global.csrfHeaderProperty }}
  SPRING_LIQUIBASE_ENABLED: {{ .Values.global.enableLiquibase | quote }}
  KEYCLOAK_CORS: "false"
  KEYCLOAK_AUTH_SERVER_URL: {{ .Values.global.keycloak.authServerUrl }}
  KEYCLOAK_PRINCIPAL_ATTRIBUTE: {{ .Values.global.keycloak.principalAttribute }}
  KEYCLOAK_REALM: {{ .Values.global.keycloak.realm }}
  KEYCLOAK_RESOURCE: {{ .Values.agencyService.keycloakResource }}
  KEYCLOAKSERVICE_ADMIN_CLIENTID: {{ .Values.global.keycloak.serviceAdminClientId }}
  TOPIC_ENRICHMENT_ENABLED: {{ .Values.agencyService.topicEnrichmentEnabled | quote }}
  KEYCLOAKSERVICE_APP_CLIENTID: {{ .Values.global.keycloak.serviceAppClientId }}
  SPRING_DATASOURCE_URL: "jdbc:mariadb://mariadb.{{ .Release.Namespace }}:3306/agencyservice"
  SPRING_PROFILES_ACTIVE: {{ .Values.agencyService.springProfilesActive }}
  CONSULTING_TYPE_SERVICE_API_URL: "http://consultingtypeservice.{{ .Release.Namespace }}:8080"
  TENANT_SERVICE_API_URL: "http://tenantservice.{{ .Release.Namespace }}:8081"
  MULTITENANCY_ENABLED: {{ .Values.global.multitenancyEnabled | quote }}
  FEATURE_TOPICS_ENABLED: {{ .Values.global.featureTopicsEnabled | quote }}
  FEATURE_DEMOGRAPHICS_ENABLED: {{ .Values.global.demographicsEnabled | quote }}
  JAVA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
  USER_ADMIN_SERVICE_API_URL: "http://userservice.{{ .Release.Namespace }}:8080"
  FEATURE_APPOINTMENT_ENABLED:  "false"
  APPOINTMENT_SERVICE_API_URL: "http://appointmentservice.{{ .Release.Namespace }}:8080"
  FEATURE_MULTITENANCY_WITH_SINGLE_DOMAIN_ENABLED: {{ .Values.global.multitenancyWithSingleDomainEnabled | quote }}
  AGENCY_DELETEWORKFLOW_CRON: {{ .Values.agencyService.agencyDeleteworkflowCron | quote }}  
  MATRIX_API_URL: {{ .Values.matrix.matrixApiUrl }}  
  MATRIX_SERVER_NAME: {{ .Values.matrix.matrixServerName }}    
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:  {{ .Values.global.springSecurityOAuth2ResourceserverJWTIssuerURI }}
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: {{ .Values.global.springSecurityOAuth2ResourceserverJWTJWKSETURI }}   
  SPRING_DATA_MONGODB_URI: {{ .Values.global.ServiceURL }} 
  {{- if .Values.global.enableTls }}
  APP_BASE_URL: "https://{{ .Values.global.domainName }}"
  {{- else }}
  APP_BASE_URL: "http://{{ .Values.global.domainName }}"
  {{- end }}
  # OBS-P2: OTLP traces/metrics to the SigNoz gateway collector. Property
  # names + full /v1/{traces,metrics} paths verified against Spring Boot
  # 4.0.1 source directly (management.otlp.tracing.endpoint does NOT exist
  # in this version).
  MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: "http://{{ .Values.global.observability.otlpCollectorHost | default (printf "%s-otel-collector.%s:4318" .Release.Name .Release.Namespace) }}/v1/traces"
  MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED: {{ .Values.global.observability.otlpEnabled | quote }}
  MANAGEMENT_OTLP_METRICS_EXPORT_URL: "http://{{ .Values.global.observability.otlpCollectorHost | default (printf "%s-otel-collector.%s:4318" .Release.Name .Release.Namespace) }}/v1/metrics"
  MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: {{ .Values.global.observability.otlpEnabled | quote }}


