apiVersion: apps/v1
kind: Deployment
metadata: 
  labels:
    app: frontend
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: frontend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: frontend
              topologyKey: kubernetes.io/hostname
      containers:
        - image:  {{ .Values.frontend.imageName }}:{{ .Values.frontend.imageVersion }}
          name: frontend          
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: frontend-configmap
          ports:
            - containerPort: 8080
          resources: {}          
      imagePullSecrets:
        - name: registry-secret
      restartPolicy: Always
