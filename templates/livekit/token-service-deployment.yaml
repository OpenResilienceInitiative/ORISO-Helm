apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-token-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: livekit-token-service
spec:
  replicas: {{ .Values.tokenService.replicas }}
  selector:
    matchLabels:
      app: livekit-token-service
  template:
    metadata:
      labels:
        app: livekit-token-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: livekit-token-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: livekit-token-service
        image: "{{ .Values.tokenService.image.repository }}:{{ .Values.tokenService.image.tag }}"
        imagePullPolicy: {{ .Values.tokenService.image.pullPolicy }}
        envFrom:
        - configMapRef:
            name: livekit-token-service-configmap-env
        ports:
        - name: http
          containerPort: {{ .Values.tokenService.service.targetPort }}
          protocol: TCP
        volumeMounts:
        - mountPath: /app/server.js
          name: script
          subPath: server.js
        {{- if .Values.resources }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- end }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      volumes:
      - configMap:
          name: livekit-token-service-script
        name: script
      terminationGracePeriodSeconds: 30