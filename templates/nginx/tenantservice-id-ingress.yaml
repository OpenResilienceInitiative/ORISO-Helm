apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /tenant/$1
    nginx.ingress.kubernetes.io/use-regex: 'true'
  name: tenantservice-id-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: '{{ .Values.global.domainName }}'
    http:
      paths:
      - backend:
          service:
            name: tenantservice
            port:
              number: 8081
        path: /service/tenant/([0-9]+)
        pathType: ImplementationSpecific
