apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/configuration-snippet: add_header Permissions-Policy
      'camera=(self "https://acme{{ .Values.global.domainName }}"), microphone=(self
      "https://acme{{ .Values.global.domainName }}"), display-capture=(self "https://acme{{
      .Values.global.domainName }}")' always;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
  name: main-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: '{{ .Values.global.domainName }}'
    http:
      paths:
      - backend:
          service:
            name: element-call
            port:
              number: 80
        path: /room
        pathType: Prefix
      - backend:
          service:
            name: agencyservice
            port:
              number: 8080
        path: /service/agencies
        pathType: Prefix
      - backend:
          service:
            name: agencyservice
            port:
              number: 8080
        path: /service/agencyadmin
        pathType: Prefix
      - backend:
          service:
            name: consultingtypeservice
            port:
              number: 8080
        path: /service/consultingtypes
        pathType: Prefix
      - backend:
          service:
            name: consultingtypeservice
            port:
              number: 8080
        path: /service/consultingtypeadmin
        pathType: Prefix
      - backend:
          service:
            name: consultingtypeservice
            port:
              number: 8080
        path: /service/topic
        pathType: Prefix
      - backend:
          service:
            name: consultingtypeservice
            port:
              number: 8080
        path: /service/settings
        pathType: Prefix
      - backend:
          service:
            name: userservice
            port:
              number: 8080
        path: /service/users
        pathType: Prefix
      - backend:
          service:
            name: userservice
            port:
              number: 8080
        path: /service/conversations
        pathType: Prefix
      - backend:
          service:
            name: userservice
            port:
              number: 8080
        path: /service/liveproxy
        pathType: Prefix
      - backend:
          service:
            name: userservice
            port:
              number: 8080
        path: /service/useradmin
        pathType: Prefix
      - backend:
          service:
            name: userservice
            port:
              number: 8080
        path: /service/appointments
        pathType: Prefix
      - backend:
          service:
            name: keycloak
            port:
              number: 8080
        path: /auth
        pathType: Prefix
      - backend:
          service:
            name: admin
            port:
              number: 8080
        path: /admin
        pathType: Prefix
      - backend:
          service:
            name: frontend
            port:
              number: 8080
        path: /error.400.html
        pathType: Prefix
      - backend:
          service:
            name: frontend
            port:
              number: 8080
        path: /static
        pathType: Prefix
      - backend:
          service:
            name: frontend
            port:
              number: 8080
        path: /public
        pathType: Prefix
      - backend:
          service:
            name: frontend
            port:
              number: 8080
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - '{{ .Values.global.domainName }}'
    - acme{{ .Values.global.domainName }}
    secretName: {{ .Values.global.domainName | replace "." "-" }}-tls
