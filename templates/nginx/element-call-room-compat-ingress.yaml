apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/permanent-redirect: https://acme{{ .Values.global.domainName
      }}/room/
    nginx.ingress.kubernetes.io/use-regex: 'true'
  name: element-call-room-compat-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: '{{ .Values.global.domainName }}'
    http:
      paths:
      - backend:
          service:
            name: element-call
            port:
              number: 80
        path: /sessions/.*/room/?(.*)
        pathType: ImplementationSpecific
