apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
  name: element-call-mainhost-static-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: '{{ .Values.global.domainName }}'
    http:
      paths:
      - backend:
          service:
            name: element-call
            port:
              number: 80
        path: /config.json
        pathType: Exact
      - backend:
          service:
            name: element-call
            port:
              number: 80
        path: /favicon.png
        pathType: Exact
      - backend:
          service:
            name: element-call
            port:
              number: 80
        path: /assets
        pathType: Prefix
      - backend:
          service:
            name: element-call
            port:
              number: 80
        path: /room
        pathType: Prefix
