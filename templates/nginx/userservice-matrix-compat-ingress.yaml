apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /matrix/$1
    nginx.ingress.kubernetes.io/use-regex: 'true'
  name: userservice-matrix-compat-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: '{{ .Values.global.domainName }}'
    http:
      paths:
      - backend:
          service:
            name: userservice
            port:
              number: 8080
        path: /sessions/.*/service/matrix/(.*)
        pathType: ImplementationSpecific
