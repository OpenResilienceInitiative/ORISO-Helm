apiVersion: v1
kind: Service
metadata:
  name: matrix-synapse
  namespace: {{ .Release.Namespace }}
  labels:
    app: matrix-synapse
spec:
  type: ClusterIP
  selector:
    app: matrix-synapse
  ports:
    - name: client
      port: 8008
      targetPort: 8008
      protocol: TCP
    - name: federation
      port: 8009
      targetPort: 8009
      protocol: TCP