apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: matrix-synapse-data
  namespace: {{ .Release.Namespace }}
  labels:
    app: matrix-synapse
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: matrix-postgres-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    app: matrix-postgres
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: matrix-postgres-backup-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    app: matrix-postgres
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
