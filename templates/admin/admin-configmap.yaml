{{- $observability := default dict .Values.global.observability -}}
{{- $domains := default dict .Values.global.domains -}}
{{- $signozHost := default "" $domains.signoz -}}
{{- $rumEnabled := and (default false $observability.webVitalsEnabled) (ne $signozHost "") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-configmap
data:
  REACT_APP_MATRIX_URL: "https://{{ .Values.global.domains.matrix }}"
  REACT_APP_KEYCLOAK_URL: "https://{{ .Values.global.domains.auth }}"
  VITE_API_URL: "https://{{ .Values.global.domainName }}"
  VITE_OBSERVABILITY_ENABLED: {{ ternary "true" "false" $rumEnabled | quote }}
  VITE_OTEL_METRICS_URL: {{ ternary (printf "https://%s/v1/metrics" $signozHost) "" $rumEnabled | quote }}
  VITE_OTEL_EXPORT_INTERVAL_MS: {{ default 60000 $observability.webVitalsExportIntervalMillis | quote }}
