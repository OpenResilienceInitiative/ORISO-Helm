name: matrix-servername-guard

# ADR-005 / DB-M04: the Matrix server_name is immutable inside every MXID and room
# ID, so it must stay a domain driven from a single value and never a bare host IP.
# This workflow enforces that with two complementary layers:
#   - a STATIC source scan (no helm/secrets needed), plus self-tests proving the
#     scanner actually rejects bad input, and
#   - a RENDER-based suite that helm-templates the Matrix config in an isolated
#     minimal chart and asserts the ADR-005 invariants on the rendered output.
on:
  pull_request:
    paths:
      - "templates/**"
      - "values.yaml*"
      - "values-*.yaml"
      - "tests/**"
      - ".github/workflows/matrix-servername-guard.yml"
  push:
    branches: [dev, pre-dev, main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Static scan — no bare-IP server_name / m.server
        run: bash tests/check-no-bare-ip-servername.sh

      - name: Guardrail self-tests (the scanner must be able to fail)
        run: bash tests/guardrail_selftest.sh

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          # Pinned: an unpinned setup-helm resolves to `latest` (today Helm 4.x),
          # so a new Helm release could silently change what this suite renders.
          version: v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --upgrade pyyaml

      - name: Render-based ADR-005 invariants
        run: python3 tests/render_adr005_test.py
