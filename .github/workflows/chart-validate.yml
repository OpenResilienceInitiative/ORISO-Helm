name: chart-validate

# The release workflow (release-helm-chart.yml) is `workflow_dispatch`-only, so its
# "Validate Helm chart" step never runs on a PR. It had silently rotted: `helm lint`
# and `helm template` both aborted on nil `global.secrets.*` because the chart ships
# no committed `values.yaml`, and nobody noticed until a release was cut.
#
# This job runs exactly the same commands on every PR, so the chart can never again
# become unrenderable without CI saying so.
on:
  pull_request:
    paths:
      - "Chart.yaml"
      - "templates/**"
      - "charts/**"
      - "values.yaml*"
      - "values-*.yaml"
      - "ci/**"
      - ".github/workflows/chart-validate.yml"
      - ".github/workflows/release-helm-chart.yml"
  push:
    branches: [dev, pre-dev, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          # Keep in sync with release-helm-chart.yml so CI and release render identically.
          version: v4.2.2

      - name: helm lint (same command as the release workflow)
        run: helm lint . -f values.yaml.default -f ci/placeholder-secrets.yaml

      - name: helm template (same command as the release workflow)
        run: helm template oriso . -f values.yaml.default -f ci/placeholder-secrets.yaml >/tmp/oriso-rendered.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --upgrade pyyaml

      - name: rendered manifests are valid YAML
        run: |
          python3 -c "import yaml,sys; d=[x for x in yaml.safe_load_all(open('/tmp/oriso-rendered.yaml')) if x]; print(f'{len(d)} manifests parse'); sys.exit(0 if d else 1)"

      - name: OBS-P1 SigNoz stack render contract
        run: python3 tests/render_obs_p1_test.py

      - name: OBS-P4a otel-agent metrics receivers render contract
        run: python3 tests/render_obs_p4a_test.py

      - name: helm package
        run: helm package . --destination /tmp/dist && ls -lh /tmp/dist

      - name: placeholder file must contain no real credentials
        run: |
          set -euo pipefail
          # Every non-comment, non-key-only line must carry the placeholder token.
          if grep -vE '^\s*#|ci-placeholder|^\s*$|:\s*$' ci/placeholder-secrets.yaml; then
            echo "::error::ci/placeholder-secrets.yaml contains a value that is not a placeholder"
            exit 1
          fi
          echo "OK: every value is a placeholder"
