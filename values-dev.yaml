# Development overlay for the ORISO chart.
#
# Apply ON TOP of your base values, e.g.:
#   helm upgrade --install caritas ./ -n caritas --create-namespace \
#     -f values.yaml -f values-dev.yaml -f secrets.yaml
#
# Only environment DELTAS belong here. This overlay lowers *test friction*
# only. It NEVER weakens security: encryption stays on, there is no encryption
# toggle anywhere. See docs/infrastructure-report-2026-07.md §7. Tracking: #24.

global:
  # Seed dummy tenants/users so the app is immediately explorable in dev.
  initializeDummyData: true

# Spring "dev" profile for the backend services (verbose errors, dev wiring).
agencyService:
  springProfilesActive: "dev"
tenantService:
  springProfilesActive: "dev"
userService:
  springProfilesActive: "dev"
  # OTP stays off in dev so backend-seeded test users log in with just a
  # password (rapid testing). Flip any of these to "true" to exercise the 2FA
  # flows. This is login posture only — not encryption.
  twoFactorAuthUserEnabled: "false"
  twoFactorAuthConsultantEnabled: "false"
  otpAllowedForUsers: "false"
  otpAllowedForConsultants: "false"
  otpAllowedForSingleTenantAdmins: "false"
  otpAllowedForTenantSuperAdmins: "false"
