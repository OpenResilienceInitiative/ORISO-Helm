# SOPS creation rules for the ORISO test-credential store.
#
# How this works
#   `sops` reads this file when you encrypt/edit a matching path and encrypts
#   the data to EVERY age recipient listed below. Any teammate (or automation)
#   holding a matching age *private* key can then decrypt. Adding or removing a
#   person = edit this list and run `sops updatekeys test-data/*.enc.json`.
#
#   `encrypted_regex` means only the credential-bearing values (password,
#   secret, token, apikey) are encrypted — usernames, env, tenant and role stay
#   in cleartext, so `git diff` stays reviewable and you can see *which* users
#   changed without decrypting.
#
# Replace the placeholder recipients below with real age public keys before use:
#   age-keygen -o ~/.config/sops/age/keys.txt      # prints your public key
# Public keys are safe to commit; private keys NEVER leave the holder's machine.

creation_rules:
  - path_regex: test-data/.*\.enc\.json$
    encrypted_regex: "^(password|secret|token|apikey)$"
    key_groups:
      - age:
          # --- human recipients (one per teammate) ---
          - age1REPLACE00000000000000000000000000000000000000000000000team1  # e.g. hassan
          - age1REPLACE00000000000000000000000000000000000000000000000team2  # e.g. dt1
          # --- automation / AI recipient (revocable independently) ---
          # Its private key is injected into agents via an environment secret;
          # remove this line + `sops updatekeys` to instantly revoke AI access.
          - age1REPLACE0000000000000000000000000000000000000000000automation
