# CI-only placeholder values — NOT a deployable overlay and NOT real secrets.
#
# The chart ships no committed `values.yaml`, and a number of templates and
# subcharts dereference secret values unconditionally (most through `b64enc`,
# which rejects nil). Without these keys `helm lint` and `helm template` abort:
#
#     nil pointer evaluating interface {}.redisdefaultPass
#     executing ... at <b64enc>: invalid value; expected string
#
# which broke the release workflow's "Validate Helm chart" step on every run.
#
# This file supplies syntactically valid placeholders so the chart can be linted,
# rendered and packaged in CI. Real values come from the cluster's secret store.
# **Never put a real credential here.**
#
# To find keys that are still missing, run the release commands and read the
# `at <.Values.some.path>` in the error, or:
#     grep -rhoE '\{\{[^}]*b64enc[^}]*\}\}' charts templates \
#       | grep -oE '\.Values\.[A-Za-z0-9_.]+' | sort -u

global:
  matrix:
    matrixAdminUsername: ci-placeholder
    matrixAdminPassword: ci-placeholder
  secrets:
    agencyServiceDbPassword: ci-placeholder
    agencyServiceDbUsername: ci-placeholder
    caritasDbPassword: ci-placeholder
    caritasDbUsername: ci-placeholder
    clickhousePassword: ci-placeholder
    # OBS-P6: HMAC salt for the (default-off) prod telemetry pseudonymization
    # pipeline. Only consumed when global.observability.telemetryPseudonymizationEnabled=true.
    telemetryPseudonymizationHmacKey: ci-placeholder
    consultingTypeMongoPass: ci-placeholder
    consultingTypeMongoUser: ci-placeholder
    consultingTypeServiceDbPassword: ci-placeholder
    consultingTypeServiceDbUsername: ci-placeholder
    keycloakAdminPassword: ci-placeholder
    keycloakAdminUsername: ci-placeholder
    keycloakDbPassword: ci-placeholder
    keycloakDbUsername: ci-placeholder
    liquibasePassword: ci-placeholder
    liquibaseUser: ci-placeholder
    matrixRegistrationSharedSecret: ci-placeholder
    rabbitmqPassword: ci-placeholder
    rabbitmqUsername: ci-placeholder
    redisdefaultPass: ci-placeholder
    tenantServiceDbPassword: ci-placeholder
    tenantServiceDbUsername: ci-placeholder
    uploadServiceDbPassword: ci-placeholder
    uploadServiceDbUsername: ci-placeholder
    userServiceDbPassword: ci-placeholder
    userServiceDbUsername: ci-placeholder
# Parent-chart templates: templates/matrix, templates/userservice,
# templates/tenantservice, templates/livekit
postgres:
  postgresDB: ci-placeholder
  postgresUser: ci-placeholder
  postgresPassword: ci-placeholder
userService:
  identityTechnicalUserUsername: ci-placeholder
  identityTechnicalUserPassword: ci-placeholder
  keycloakTechnicalUsername: ci-placeholder
  keycloakTechnicalPassword: ci-placeholder
  rocketSystemuserUsername: ci-placeholder
  rocketSystemuserPassword: ci-placeholder
  rocketTechnicalUsername: ci-placeholder
  rocketTechnicalPassword: ci-placeholder
  serviceEncryptionAppkey: ci-placeholder
tenantService:
  springRabbitmqUsername: ci-placeholder
  springRabbitmqPassword: ci-placeholder
# Subcharts are keyed by chart name, not directory name
# (charts/mariadb -> online-counseling-mariadb, charts/mongodb -> online-counseling-mongodb).
online-counseling-mariadb:
  dbRootPassword: ci-placeholder
online-counseling-mongodb:
  mongoSharedKey: ci-placeholder
  mongoInitDbRootUsername: ci-placeholder
  mongoInitDbRootPassword: ci-placeholder
  noSqlClientMongoUsername: ci-placeholder
  noSqlClientMongoPassword: ci-placeholder
  oplogMongoUsername: ci-placeholder
  oplogMongoPassword: ci-placeholder
  statisticsMongoUser: ci-placeholder
  statisticsMongoPass: ci-placeholder
livekit:
  api:
    key: ci-placeholder
    secret: ci-placeholder
